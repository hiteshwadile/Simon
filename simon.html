<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="simon.css">
</head>
<body>
    <h1>Simon Game</h1>
    <h3>Press any key to start the game</h3>
    <h3 id="level"></h3>
    <div class="btn-container">
        <div class="line-one">
            <div class="btn red" id="red" type="button">first</div>
            <div class="btn yellow" id="yellow" type="button">second</div>
        </div>
        <div class="line-two">
            <div class="btn green" id="green" type="button">third</div>
            <div class="btn blue" id="blue" type="button">forth</div>
        </div>

        
        
    <script src="simon.js"></script>
    </div>
</body>
</html>
